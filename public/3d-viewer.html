<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UK Construction 3D Model</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow: hidden;
            background: #f0f4f8;
        }
        #canvas { 
            display: block; 
            width: 100vw; 
            height: 100vh;
            cursor: grab;
        }
        #canvas:active { cursor: grabbing; }
        
        .controls {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            z-index: 10;
        }
        
        .control-btn {
            display: block;
            width: 100%;
            padding: 12px 20px;
            margin: 8px 0;
            border: none;
            border-radius: 8px;
            background: #2563eb;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }
        
        .control-btn:hover {
            background: #1d4ed8;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.4);
        }
        
        .control-btn.active {
            background: #10b981;
        }
        
        .info-panel {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            max-width: 320px;
        }
        
        .info-title {
            font-size: 18px;
            font-weight: 700;
            color: #1a202c;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .info-text {
            font-size: 13px;
            color: #4a5568;
            line-height: 1.8;
        }
        
        .badge {
            display: inline-block;
            padding: 4px 12px;
            background: #dbeafe;
            color: #1e40af;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <div class="controls">
        <button class="control-btn active" id="autoRotateBtn">🔄 Auto Rotate</button>
        <button class="control-btn" id="dayNightBtn">🌙 Night Mode</button>
        <button class="control-btn" id="qualityBtn">✨ High Quality</button>
        <button class="control-btn" id="resetBtn">↺ Reset View</button>
    </div>
    
    <div class="info-panel">
        <div class="info-title">🏠 Semi-Detached House</div>
        <div class="info-text">
            <strong>Type:</strong> Victorian/Edwardian<br>
            <strong>Location:</strong> Greater London<br>
            <strong>Bedrooms:</strong> 3<br>
            <strong>Floors:</strong> 2 + Loft<br>
            <strong>Plot:</strong> 150m²<br>
            <strong>Year Built:</strong> 1890s
        </div>
        <div class="badge">Photorealistic Render</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xe0f2fe);
        scene.fog = new THREE.Fog(0xe0f2fe, 40, 100);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(18, 8, 18);
        camera.lookAt(0, 4, 0);
        
        const renderer = new THREE.WebGLRenderer({ 
            canvas: document.getElementById('canvas'), 
            antialias: true,
            powerPreference: "high-performance"
        });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        
        // Realistic Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);
        
        const sunLight = new THREE.DirectionalLight(0xfff5e6, 1.2);
        sunLight.position.set(15, 20, 10);
        sunLight.castShadow = true;
        sunLight.shadow.mapSize.width = 4096;
        sunLight.shadow.mapSize.height = 4096;
        sunLight.shadow.camera.left = -25;
        sunLight.shadow.camera.right = 25;
        sunLight.shadow.camera.top = 25;
        sunLight.shadow.camera.bottom = -25;
        sunLight.shadow.camera.near = 0.5;
        sunLight.shadow.camera.far = 50;
        sunLight.shadow.bias = -0.0001;
        scene.add(sunLight);
        
        const fillLight = new THREE.DirectionalLight(0xb3d9ff, 0.3);
        fillLight.position.set(-10, 10, -10);
        scene.add(fillLight);
        
        const hemisphereLight = new THREE.HemisphereLight(0x87ceeb, 0x8b7355, 0.6);
        scene.add(hemisphereLight);
        
        // Procedural Brick Texture
        function createBrickTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');
            
            // Base brick color
            ctx.fillStyle = '#8b4726';
            ctx.fillRect(0, 0, 512, 512);
            
            const brickWidth = 128;
            const brickHeight = 32;
            const mortarWidth = 4;
            
            for (let y = 0; y < 512; y += brickHeight + mortarWidth) {
                for (let x = 0; x < 512; x += brickWidth + mortarWidth) {
                    const offset = (Math.floor(y / (brickHeight + mortarWidth)) % 2) * (brickWidth / 2);
                    const brickX = (x + offset) % 512;
                    
                    // Brick variation
                    const variation = Math.random() * 20 - 10;
                    ctx.fillStyle = `rgb(${139 + variation}, ${71 + variation}, ${38 + variation})`;
                    ctx.fillRect(brickX, y, brickWidth, brickHeight);
                    
                    // Brick details
                    ctx.fillStyle = `rgba(0, 0, 0, ${Math.random() * 0.1})`;
                    ctx.fillRect(brickX + 2, y + 2, brickWidth - 4, brickHeight - 4);
                }
            }
            
            // Mortar lines
            ctx.strokeStyle = '#c9b8a8';
            ctx.lineWidth = mortarWidth;
            for (let y = 0; y < 512; y += brickHeight + mortarWidth) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(512, y);
                ctx.stroke();
            }
            
            const texture = new THREE.CanvasTexture(canvas);
            texture.wrapS = THREE.RepeatWrapping;
            texture.wrapT = THREE.RepeatWrapping;
            return texture;
        }
        
        // Roof Tile Texture
        function createRoofTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');
            
            ctx.fillStyle = '#2d3748';
            ctx.fillRect(0, 0, 512, 512);
            
            const tileWidth = 64;
            const tileHeight = 32;
            
            for (let y = 0; y < 512; y += tileHeight) {
                for (let x = 0; x < 512; x += tileWidth) {
                    const shade = Math.random() * 30 - 15;
                    ctx.fillStyle = `rgb(${45 + shade}, ${55 + shade}, ${72 + shade})`;
                    ctx.fillRect(x, y, tileWidth - 2, tileHeight - 1);
                }
            }
            
            const texture = new THREE.CanvasTexture(canvas);
            texture.wrapS = THREE.RepeatWrapping;
            texture.wrapT = THREE.RepeatWrapping;
            return texture;
        }
        
        const brickTexture = createBrickTexture();
        brickTexture.repeat.set(3, 2);
        
        const roofTexture = createRoofTexture();
        roofTexture.repeat.set(4, 4);
        
        // Realistic Materials
        const brickMaterial = new THREE.MeshStandardMaterial({ 
            map: brickTexture,
            roughness: 0.9,
            metalness: 0.0,
            normalScale: new THREE.Vector2(0.5, 0.5)
        });
        
        const roofMaterial = new THREE.MeshStandardMaterial({ 
            map: roofTexture,
            roughness: 0.7,
            metalness: 0.1,
            normalScale: new THREE.Vector2(0.3, 0.3)
        });
        
        const windowMaterial = new THREE.MeshPhysicalMaterial({ 
            color: 0xffffff,
            metalness: 0.1,
            roughness: 0.05,
            transmission: 0.9,
            thickness: 0.5,
            envMapIntensity: 1.5,
            clearcoat: 1.0,
            clearcoatRoughness: 0.1
        });
        
        const doorMaterial = new THREE.MeshStandardMaterial({ 
            color: 0x1a1a1a,
            roughness: 0.6,
            metalness: 0.2
        });
        
        const whitePaintMaterial = new THREE.MeshStandardMaterial({ 
            color: 0xf8f9fa,
            roughness: 0.4,
            metalness: 0.0
        });
        
        // Building Group
        const building = new THREE.Group();
        
        // Main Structure - Ground Floor
        const groundFloor = new THREE.Mesh(new THREE.BoxGeometry(8, 3.2, 6), brickMaterial);
        groundFloor.position.set(0, 1.6, 0);
        groundFloor.castShadow = true;
        groundFloor.receiveShadow = true;
        building.add(groundFloor);
        
        // First Floor
        const firstFloor = new THREE.Mesh(new THREE.BoxGeometry(8, 3.2, 6), brickMaterial);
        firstFloor.position.set(0, 4.8, 0);
        firstFloor.castShadow = true;
        firstFloor.receiveShadow = true;
        building.add(firstFloor);
        
        // Pitched Roof with proper angle
        const roofGeometry = new THREE.BoxGeometry(4.5, 0.15, 6.5);
        
        const roofLeft = new THREE.Mesh(roofGeometry, roofMaterial);
        roofLeft.position.set(-2, 7.2, 0);
        roofLeft.rotation.z = -Math.PI / 4.5;
        roofLeft.castShadow = true;
        building.add(roofLeft);
        
        const roofRight = new THREE.Mesh(roofGeometry, roofMaterial);
        roofRight.position.set(2, 7.2, 0);
        roofRight.rotation.z = Math.PI / 4.5;
        roofRight.castShadow = true;
        building.add(roofRight);
        
        // Ridge Tiles
        const ridge = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.2, 6.6), roofMaterial);
        ridge.position.set(0, 8.3, 0);
        ridge.castShadow = true;
        building.add(ridge);
        
        // Chimney Stack - Realistic proportions
        const chimneyBrick = new THREE.Mesh(new THREE.BoxGeometry(0.8, 2.5, 0.8), brickMaterial);
        chimneyBrick.position.set(2.5, 9, 1);
        chimneyBrick.castShadow = true;
        building.add(chimneyBrick);
        
        const chimneyPot = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.35, 0.7, 12), new THREE.MeshStandardMaterial({ color: 0x8b4513, roughness: 0.8 }));
        chimneyPot.position.set(2.5, 10.6, 1);
        chimneyPot.castShadow = true;
        building.add(chimneyPot);
        
        // Bay Window - Ground Floor (Classic UK feature)
        const bayDepth = 0.8;
        const bayWidth = 2.5;
        
        // Bay center
        const bayCenter = new THREE.Mesh(new THREE.BoxGeometry(bayWidth, 2.8, bayDepth), windowMaterial);
        bayCenter.position.set(0, 1.6, 3 + bayDepth/2);
        bayCenter.castShadow = true;
        building.add(bayCenter);
        
        // Bay sides
        const baySideGeom = new THREE.BoxGeometry(0.8, 2.8, 0.15);
        const bayLeft = new THREE.Mesh(baySideGeom, windowMaterial);
        bayLeft.position.set(-bayWidth/2 - 0.4, 1.6, 3.3);
        bayLeft.rotation.y = -Math.PI / 6;
        bayLeft.castShadow = true;
        building.add(bayLeft);
        
        const bayRight = new THREE.Mesh(baySideGeom, windowMaterial);
        bayRight.position.set(bayWidth/2 + 0.4, 1.6, 3.3);
        bayRight.rotation.y = Math.PI / 6;
        bayRight.castShadow = true;
        building.add(bayRight);
        
        // Bay roof
        const bayRoof = new THREE.Mesh(new THREE.BoxGeometry(bayWidth + 1, 0.15, bayDepth + 0.5), roofMaterial);
        bayRoof.position.set(0, 3.1, 3.2);
        bayRoof.rotation.x = -0.1;
        bayRoof.castShadow = true;
        building.add(bayRoof);
        
        // Sash Windows - First Floor (Realistic proportions)
        const sashWidth = 1.4;
        const sashHeight = 2.2;
        
        [-2.5, 2.5].forEach(x => {
            const window = new THREE.Mesh(new THREE.BoxGeometry(sashWidth, sashHeight, 0.15), windowMaterial);
            window.position.set(x, 4.8, 3.05);
            window.castShadow = true;
            building.add(window);
            
            // Window frame
            const frame = new THREE.Mesh(new THREE.BoxGeometry(sashWidth + 0.15, sashHeight + 0.15, 0.1), whitePaintMaterial);
            frame.position.set(x, 4.8, 3.1);
            frame.castShadow = true;
            building.add(frame);
            
            // Window sill
            const sill = new THREE.Mesh(new THREE.BoxGeometry(sashWidth + 0.2, 0.15, 0.3), whitePaintMaterial);
            sill.position.set(x, 3.6, 3.15);
            sill.castShadow = true;
            building.add(sill);
        });
        
        // Front Door - Realistic Victorian style
        const door = new THREE.Mesh(new THREE.BoxGeometry(1.2, 2.5, 0.12), doorMaterial);
        door.position.set(-3, 1.25, 3.05);
        door.castShadow = true;
        building.add(door);
        
        // Door frame
        const doorFrame = new THREE.Mesh(new THREE.BoxGeometry(1.35, 2.65, 0.15), whitePaintMaterial);
        doorFrame.position.set(-3, 1.25, 3.08);
        building.add(doorFrame);
        
        // Door panels
        [0.6, 0, -0.6].forEach(y => {
            const panel = new THREE.Mesh(new THREE.BoxGeometry(0.9, 0.5, 0.05), new THREE.MeshStandardMaterial({ color: 0x0a0a0a, roughness: 0.5 }));
            panel.position.set(-3, 1.25 + y, 3.12);
            building.add(panel);
        });
        
        // Brass door furniture
        const knocker = new THREE.Mesh(new THREE.SphereGeometry(0.08, 16, 16), new THREE.MeshStandardMaterial({ color: 0xb8860b, roughness: 0.2, metalness: 0.9 }));
        knocker.position.set(-3, 2, 3.18);
        knocker.castShadow = true;
        building.add(knocker);
        
        // Front steps
        const steps = new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.3, 0.8), new THREE.MeshStandardMaterial({ color: 0x808080, roughness: 0.7 }));
        steps.position.set(-3, 0.15, 3.6);
        steps.receiveShadow = true;
        building.add(steps);
        
        // Guttering and downpipes
        const gutterMaterial = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.4, metalness: 0.6 });
        
        const gutter = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 8.5, 12), gutterMaterial);
        gutter.rotation.z = Math.PI / 2;
        gutter.position.set(0, 6.3, 3.2);
        gutter.castShadow = true;
        building.add(gutter);
        
        [-3.5, 3.5].forEach(x => {
            const downpipe = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.06, 6.3, 12), gutterMaterial);
            downpipe.position.set(x, 3.15, 3.15);
            downpipe.castShadow = true;
            building.add(downpipe);
        });
        
        // Foundation
        const foundation = new THREE.Mesh(new THREE.BoxGeometry(8.3, 0.2, 6.3), new THREE.MeshStandardMaterial({ color: 0x4a5568, roughness: 0.9 }));
        foundation.position.set(0, 0.1, 0);
        foundation.receiveShadow = true;
        building.add(foundation);
        
        scene.add(building);
        
        // Realistic Ground with grass texture
        const groundGeometry = new THREE.PlaneGeometry(100, 100);
        const groundMaterial = new THREE.MeshStandardMaterial({ 
            color: 0x4a7c59,
            roughness: 0.95
        });
        const ground = new THREE.Mesh(groundGeometry, groundMaterial);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.01;
        ground.receiveShadow = true;
        scene.add(ground);
        
        // Front garden path
        const path = new THREE.Mesh(
            new THREE.BoxGeometry(2, 0.05, 8),
            new THREE.MeshStandardMaterial({ color: 0xb8b8b8, roughness: 0.8 })
        );
        path.position.set(-3, 0.025, 7);
        path.receiveShadow = true;
        scene.add(path);
        
        // Garden fence
        const fenceMaterial = new THREE.MeshStandardMaterial({ color: 0x3d2817, roughness: 0.9 });
        for (let i = -4; i <= 4; i += 0.5) {
            const post = new THREE.Mesh(new THREE.BoxGeometry(0.08, 1, 0.08), fenceMaterial);
            post.position.set(i, 0.5, 10);
            post.castShadow = true;
            scene.add(post);
        }
        
        // Controls
        let autoRotate = true;
        let isDayMode = true;
        let highQuality = true;
        let mouseDown = false;
        let mouseX = 0, mouseY = 0;
        
        document.getElementById('canvas').addEventListener('mousedown', (e) => {
            mouseDown = true;
            mouseX = e.clientX;
            mouseY = e.clientY;
        });
        
        document.addEventListener('mouseup', () => mouseDown = false);
        
        document.addEventListener('mousemove', (e) => {
            if (mouseDown) {
                const deltaX = e.clientX - mouseX;
                const deltaY = e.clientY - mouseY;
                building.rotation.y += deltaX * 0.005;
                camera.position.y += deltaY * 0.05;
                camera.position.y = Math.max(3, Math.min(15, camera.position.y));
                camera.lookAt(0, 4, 0);
                mouseX = e.clientX;
                mouseY = e.clientY;
            }
        });
        
        document.getElementById('autoRotateBtn').addEventListener('click', function() {
            autoRotate = !autoRotate;
            this.classList.toggle('active');
        });
        
        document.getElementById('dayNightBtn').addEventListener('click', function() {
            isDayMode = !isDayMode;
            this.textContent = isDayMode ? '🌙 Night Mode' : '☀️ Day Mode';
            scene.background = new THREE.Color(isDayMode ? 0xe0f2fe : 0x0a1929);
            scene.fog = new THREE.Fog(isDayMode ? 0xe0f2fe : 0x0a1929, 40, 100);
            ambientLight.intensity = isDayMode ? 0.4 : 0.1;
            sunLight.intensity = isDayMode ? 1.2 : 0.2;
            sunLight.color = new THREE.Color(isDayMode ? 0xfff5e6 : 0x4a5f7f);
        });
        
        document.getElementById('qualityBtn').addEventListener('click', function() {
            highQuality = !highQuality;
            this.textContent = highQuality ? '✨ High Quality' : '⚡ Performance';
            this.classList.toggle('active');
            renderer.setPixelRatio(highQuality ? window.devicePixelRatio : 1);
        });
        
        document.getElementById('resetBtn').addEventListener('click', () => {
            building.rotation.y = 0;
            camera.position.set(18, 8, 18);
            camera.lookAt(0, 4, 0);
        });
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        function animate() {
            requestAnimationFrame(animate);
            if (autoRotate) {
                building.rotation.y += 0.002;
            }
            renderer.render(scene, camera);
        }
        
        animate();
    </script>
</body>
</html>
